<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类浏览 · 斯诺知识库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .browse-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .browse-tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid #eadfd4;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: #b32d2d;
            border-bottom-color: #b32d2d;
        }
        .browse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .browse-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #eadfd4;
            padding: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .browse-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border-color: #b32d2d;
        }
        .browse-card h3 {
            color: #b32d2d;
            margin-bottom: 0.5rem;
        }
        .browse-card .type {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .browse-card p {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button id="backBtn" class="nav-btn" style="background: none; border: none; cursor: pointer;">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
            <a href="map.html" class="nav-btn"><i class="fas fa-map-marked-alt"></i> 时空足迹</a>
            <a href="network.html" class="nav-btn"><i class="fas fa-network-wired"></i> 实体关系网</a>
            <a href="timeline.html" class="nav-btn"><i class="fas fa-timeline"></i> 大事件年历</a>
            <a href="global-network.html" class="nav-btn"><i class="fas fa-globe"></i> 全局人物网</a>
            <a href="browse.html" class="nav-btn active"><i class="fas fa-th-large"></i> 分类浏览</a>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="text" id="globalSearchInput" placeholder="搜索..." style="padding: 6px 12px; border-radius: 40px; border: 1px solid #ddd;">
            <button id="globalSearchBtn" style="background: #b32d2d; border: none; color: white; padding: 6px 14px; border-radius: 40px; margin-left: 8px; cursor: pointer;">🔍</button>
        </div>
    </div>
    <script>
        document.getElementById('backBtn')?.addEventListener('click', () => window.history.back());
        const searchInput = document.getElementById('globalSearchInput');
        const searchBtn = document.getElementById('globalSearchBtn');
        if (searchBtn && searchInput) {
            searchBtn.onclick = () => {
                const q = searchInput.value.trim();
                if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
            };
            searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchBtn.click(); };
        }
    </script>

    <div class="browse-container">
        <div class="browse-tabs">
            <button class="tab-btn active" data-category="persons">人物</button>
            <button class="tab-btn" data-category="events">事件</button>
            <button class="tab-btn" data-category="locations">地点</button>
            <button class="tab-btn" data-category="works">著作/报刊</button>
        </div>
        <div id="browseGrid" class="browse-grid">加载中...</div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/browse.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
