<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>时空足迹 · 斯诺在中国</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 覆盖部分地图样式使其适应深色 */
        .leaflet-container { background: #1e1e1e; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #2c2c2c;
            color: #e0e0e0;
            border-radius: 8px;
            border-left: 4px solid #b32d2d;
        }
        .loc-jump { background: #b32d2d; color: white; border: none; }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button id="backBtn" class="nav-btn" style="background: none; border: none; cursor: pointer;">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
            <a href="map.html" class="nav-btn"><i class="fas fa-map-marked-alt"></i> 时空足迹</a>
            <a href="network.html" class="nav-btn"><i class="fas fa-network-wired"></i> 实体关系网</a>
            <a href="timeline.html" class="nav-btn"><i class="fas fa-timeline"></i> 大事件年历</a>
            <a href="global-network.html" class="nav-btn"><i class="fas fa-globe"></i> 全局人物网</a>
            <a href="browse.html" class="nav-btn"><i class="fas fa-th-large"></i> 分类浏览</a>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="text" id="globalSearchInput" placeholder="搜索..." style="padding: 6px 12px; border-radius: 40px; border: 1px solid #ddd;">
            <button id="globalSearchBtn" style="background: #b32d2d; border: none; color: white; padding: 6px 14px; border-radius: 40px; margin-left: 8px; cursor: pointer;">🔍</button>
        </div>
    </div>
    <script>
        // 返回上一页
        document.getElementById('backBtn')?.addEventListener('click', () => { window.history.back(); });
        // 搜索跳转（如果搜索输入框存在）
        const searchInput = document.getElementById('globalSearchInput');
        const searchBtn = document.getElementById('globalSearchBtn');
        if (searchBtn && searchInput) {
            searchBtn.onclick = () => {
                const q = searchInput.value.trim();
                if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
            };
            searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchBtn.click(); };
        }
    </script>
    <div class="page-container">
        <h2>斯诺的时空足迹 · 历史现场</h2>
        <div class="map-container">
            <div id="map"></div>
            <div class="event-sidebar">
                <h3>重要地点 & 关联事件（点击跳转时间轴）</h3>
                <div id="dynamicEventsList">加载地图中...</div>
            </div>
        </div>
        <!-- 图例 -->
        <div class="map-legend">
            <span><span class="legend-dot red"></span> 重大事件地</span>
            <span><span class="legend-dot blue"></span> 长期居住地</span>
            <span><span class="legend-dot green"></span> 途经/旅行地</span>
        </div>
        <footer>点击地图上的标记点可查看详情，悬浮显示事件摘要 | 侧边栏事件可跳转时间轴</footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script>
        window.addEventListener('load', function() {
            if (typeof L === 'undefined') {
                document.getElementById('dynamicEventsList').innerHTML = '<div style="color:red;">❌ 地图库加载失败，请检查网络后刷新页面。</div>';
            }
        });
    </script>
    <script src="js/data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/map.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <!-- <script src="js/book-data.js"></script>   书籍全文数据 -->
    <script src="js/knowledge-base.js"></script>
    <script src="js/ai-chat.js"></script>
</body>
</html>
