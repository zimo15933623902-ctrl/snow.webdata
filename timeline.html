<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大事件年历 · 斯诺见证的历史</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --snow-red: #b32d2d;
            --snow-dark: #1e1e1e;
            --snow-paper: #fffaf3;
            --snow-line: #eadfd4;
        }
        body {
            background:
                radial-gradient(circle at top left, rgba(179,45,45,0.1), transparent 30rem),
                linear-gradient(180deg, #fffaf3 0%, #f8f8f8 58%);
        }
        .timeline-page {
            max-width: 1280px;
        }
        .timeline-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 1.5rem;
            align-items: end;
            margin-bottom: 1.4rem;
            padding: clamp(1.5rem, 4vw, 2.5rem);
            border-radius: 28px;
            background:
                linear-gradient(135deg, rgba(30,30,30,0.88), rgba(179,45,45,0.76)),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.22), transparent 20rem);
            color: #fff;
            box-shadow: 0 18px 45px rgba(68,42,28,0.12);
            overflow: hidden;
            position: relative;
        }
        .timeline-hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
            background-size: 46px 46px;
            pointer-events: none;
        }
        .timeline-kicker {
            color: #ffe7c0;
            font-weight: 800;
            letter-spacing: 0.12em;
            margin-bottom: 0.6rem;
        }
        .timeline-hero h1 {
            position: relative;
            z-index: 1;
            font-size: clamp(2.2rem, 5vw, 4.8rem);
            line-height: 1;
            margin: 0 0 0.8rem;
        }
        .timeline-hero p {
            position: relative;
            z-index: 1;
            color: rgba(255,255,255,0.84);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 760px;
        }
        .timeline-count {
            position: relative;
            z-index: 1;
            min-width: 150px;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 22px;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .timeline-count strong {
            display: block;
            color: #ffe7c0;
            font-size: 2.6rem;
            line-height: 1;
        }
        .timeline-controls {
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.7rem;
            flex-wrap: wrap;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--snow-line);
            border-radius: 20px;
            background: rgba(255,255,255,0.86);
            box-shadow: 0 10px 28px rgba(68,42,28,0.06);
        }
        .timeline-controls span {
            color: #666;
            font-weight: 700;
        }
        .filter-btn {
            background: #fff;
            border: 1px solid var(--snow-line);
            padding: 0.48rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            font: inherit;
            color: #444;
            transition: 0.18s ease;
        }
        .filter-btn:hover,
        .filter-btn.active-filter {
            background: var(--snow-red);
            color: #fff;
            border-color: var(--snow-red);
            box-shadow: 0 8px 18px rgba(179,45,45,0.18);
        }
        .timeline {
            position: relative;
            max-width: 1120px;
            margin: 0 auto;
            padding: 1rem 0 1rem 0;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            transform: translateX(-50%);
            background: linear-gradient(180deg, transparent, rgba(179,45,45,0.35), transparent);
        }
        .timeline-item {
            position: relative;
            width: calc(50% - 2.5rem);
            margin-bottom: 1.4rem;
            background: rgba(255,255,255,0.94);
            border: 1px solid var(--snow-line);
            border-radius: 22px;
            padding: 1.2rem;
            box-shadow: 0 14px 34px rgba(68,42,28,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .timeline-item:nth-child(odd) {
            margin-right: auto;
        }
        .timeline-item:nth-child(even) {
            margin-left: auto;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            top: 1.45rem;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--snow-red);
            border: 4px solid #fff;
            box-shadow: 0 0 0 5px rgba(179,45,45,0.1);
        }
        .timeline-item:nth-child(odd)::before {
            right: -3.18rem;
        }
        .timeline-item:nth-child(even)::before {
            left: -3.18rem;
        }
        .timeline-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 42px rgba(68,42,28,0.13);
        }
        .timeline-date {
            display: flex;
            gap: 0.6rem;
            align-items: center;
            color: var(--snow-red);
            font-weight: 900;
            font-size: 1.1rem;
        }
        .importance {
            display: inline-block;
            background: rgba(179,45,45,0.08);
            color: var(--snow-red);
            padding: 0.18rem 0.58rem;
            border-radius: 999px;
            font-size: 0.72rem;
        }
        .timeline-title {
            font-size: 1.35rem;
            font-weight: 900;
            margin: 0.45rem 0;
            color: var(--snow-dark);
        }
        .timeline-desc {
            color: #555;
            line-height: 1.65;
        }
        .timeline-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            color: #777;
            font-size: 0.85rem;
        }
        .timeline-meta span {
            padding: 0.28rem 0.58rem;
            border-radius: 999px;
            background: #fff7f3;
            border: 1px solid var(--snow-line);
        }
        .event-original-text {
            margin-top: 0.9rem;
            background: #fffaf8;
            border: 1px solid var(--snow-line);
            border-left: 4px solid var(--snow-red);
            padding: 0.85rem 1rem;
            border-radius: 14px;
            font-size: 0.88rem;
            color: #444;
        }
        .event-original-text strong {
            color: var(--snow-red);
        }
        .original-content {
            max-height: 130px;
            overflow-y: auto;
            margin-top: 0.5rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .timeline-btn {
            margin-top: 0.9rem;
            background: var(--snow-red);
            color: #fff;
            border: none;
            padding: 0.48rem 0.9rem;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 8px 18px rgba(179,45,45,0.18);
        }
        @media (max-width: 820px) {
            .timeline-hero {
                grid-template-columns: 1fr;
            }
            .timeline::before {
                left: 1rem;
            }
            .timeline-item {
                width: auto;
                margin-left: 2.4rem !important;
                margin-right: 0 !important;
            }
            .timeline-item::before {
                left: -2.2rem !important;
                right: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button id="backBtn" class="nav-btn" style="background: none; border: none; cursor: pointer;">
                <i class="fas fa-arrow-left"></i> 返回
            </button>
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
            <a href="map.html" class="nav-btn"><i class="fas fa-map-marked-alt"></i> 时空足迹</a>
            <a href="network.html" class="nav-btn"><i class="fas fa-network-wired"></i> 实体关系网</a>
            <a href="timeline.html" class="nav-btn"><i class="fas fa-timeline"></i> 大事件年历</a>
            <a href="global-network.html" class="nav-btn"><i class="fas fa-globe"></i> 全局人物网</a>
            <a href="browse.html" class="nav-btn"><i class="fas fa-th-large"></i> 分类浏览</a>
        </div>
        <div style="display: flex; align-items: center;">
            <input type="text" id="globalSearchInput" placeholder="搜索..." style="padding: 6px 12px; border-radius: 40px; border: 1px solid #ddd;">
            <button id="globalSearchBtn" style="background: #b32d2d; border: none; color: white; padding: 6px 14px; border-radius: 40px; margin-left: 8px; cursor: pointer;">🔍</button>
        </div>
    </div>
    <script>
        // 返回上一页
        document.getElementById('backBtn')?.addEventListener('click', () => { window.history.back(); });
        // 搜索跳转（如果搜索输入框存在）
        const searchInput = document.getElementById('globalSearchInput');
        const searchBtn = document.getElementById('globalSearchBtn');
        if (searchBtn && searchInput) {
            searchBtn.onclick = () => {
                const q = searchInput.value.trim();
                if (q) location.href = `search.html?q=${encodeURIComponent(q)}`;
            };
            searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchBtn.click(); };
        }
    </script>
    <main class="page-container timeline-page">
        <section class="timeline-hero">
            <div>
                <div class="timeline-kicker">EDGAR SNOW · HISTORICAL CALENDAR</div>
                <h1>大事件年历</h1>
                <p>按时间顺序梳理斯诺在中国观察到、记录过或用于解释时代背景的重要事件，从历史现场进入新闻写作与人物关系。</p>
            </div>
            <div class="timeline-count">
                <strong id="timelineCount">--</strong>
                <span>历史事件</span>
            </div>
        </section>
        <div class="timeline-controls"></div>
        <div id="timeline-container" class="timeline"></div>
        <footer>点击「查看地图」可跳转至对应地点</footer>
    </main>
    <script src="js/data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/timeline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <!-- <script src="js/book-data.js"></script>   书籍全文数据 -->
    <script src="js/knowledge-base.js"></script>
    <script src="js/ai-chat.js"></script>
</body>
</html>
