<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>大事件年历 · 斯诺见证的历史</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .timeline-controls { margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        .filter-btn { background: #e9ddce; border: none; padding: 6px 16px; border-radius: 40px; cursor: pointer; }
        .filter-btn.active-filter { background: #8b2c1d; color: white; }
        .timeline { position: relative; max-width: 1000px; margin: 0 auto; padding-left: 2rem; }
        .timeline::before { content: ''; position: absolute; left: 20px; top: 0; bottom: 0; width: 3px; background: #c0a375; }
        .timeline-item { position: relative; margin-bottom: 2rem; background: white; border-radius: 20px; padding: 1rem 1.5rem; border-left: 6px solid #8b2c1d; transition: 0.2s; }
        .timeline-item:hover { transform: translateX(6px); background: #fffaf2; }
        .timeline-date { font-weight: bold; color: #8b2c1d; font-size: 1.1rem; }
        .timeline-title { font-size: 1.3rem; font-weight: bold; margin: 0.3rem 0; }
        .importance { display: inline-block; background: #e0b354; padding: 2px 10px; border-radius: 30px; font-size: 0.7rem; margin-left: 12px; }
        .timeline-btn { margin-top: 8px; background: #e0b354; border: none; padding: 4px 12px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        .event-original-text {
            margin-top: 12px;
            background: #f9f5f0;
            border-left: 4px solid #b32d2d;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #2c3e2f;
        }
        .event-original-text strong {
            color: #b32d2d;
            font-size: 0.85rem;
        }
        .original-content {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 8px;
            line-height: 1.5;
            white-space: pre-wrap;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding-right: 6px;
        }
        .original-content::-webkit-scrollbar {
            width: 5px;
        }
        .original-content::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 4px;
        }
        .original-content::-webkit-scrollbar-thumb {
            background: #b32d2d;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
        <a href="map.html" class="nav-btn"><i class="fas fa-map-marked-alt"></i> 时空足迹</a>
        <a href="network.html" class="nav-btn"><i class="fas fa-network-wired"></i> 人物关系网</a>
        <a href="timeline.html" class="nav-btn active"><i class="fas fa-timeline"></i> 大事件年历</a>
    </div>
    <div class="page-container">
        <h2>大事件年历 · 竖屏史诗</h2>
        <div class="timeline-controls">
            <span>筛选类型：</span>
            <button class="filter-btn active-filter" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="政治事件">政治事件</button>
            <button class="filter-btn" data-filter="战争">战争</button>
            <button class="filter-btn" data-filter="社会运动">社会运动</button>
            <button class="filter-btn" data-filter="自然灾害">自然灾害</button>
            <button class="filter-btn" data-filter="军事行动">军事行动</button>
            <button class="filter-btn" data-filter="历史事件">历史事件</button>
        </div>
        <div id="timeline-container" class="timeline"></div>
        <footer>点击「查看地图」可跳转至对应地点</footer>
    </div>
    <script src="js/data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/timeline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <!-- <script src="js/book-data.js"></script>   书籍全文数据 -->
    <script src="js/knowledge-base.js"></script>
    <script src="js/ai-chat.js"></script>
</body>
</html>
